name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GOPRIVATE: github.com/ToastyTheBot/*
  GONOSUMCHECK: github.com/ToastyTheBot/*
  GONOSUMDB: github.com/ToastyTheBot/*

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: Build Caddy with caddy-anubis plugin
        run: xcaddy build --with github.com/ToastyTheBot/caddy-anubis=.

      - name: Verify binary
        run: ./caddy version

      - name: Vet
        run: go vet ./...
