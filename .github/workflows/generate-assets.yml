name: Update Anubis Fork

on:
  push:
    branches: [main]
    paths: [go.mod]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-fork:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Determine Anubis version
        id: version
        run: |
          ANUBIS_VERSION=$(grep 'github.com/ToastyTheBot/anubis' go.mod | awk '{print $2}')
          echo "anubis_version=${ANUBIS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Clone upstream Anubis at base version
        env:
          ANUBIS_VERSION: ${{ steps.version.outputs.anubis_version }}
        run: |
          # Extract the upstream tag from the pseudo-version or use directly
          # The fork is based on upstream tags, so derive the base version
          BASE_TAG=$(echo "$ANUBIS_VERSION" | sed -E 's/^v([0-9]+\.[0-9]+)\.[0-9]+-0\..*/v\1.0/')
          echo "Cloning upstream Anubis at ${BASE_TAG}"
          git clone --branch "${BASE_TAG}" --depth 1 https://github.com/TecharoHQ/anubis.git /tmp/anubis

      - name: Build Anubis assets
        run: |
          cd /tmp/anubis
          npm ci
          make assets

      - name: Update fork
        env:
          ANUBIS_VERSION: ${{ steps.version.outputs.anubis_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/ToastyTheBot/anubis.git /tmp/anubis-fork
          cd /tmp/anubis-fork
          git checkout caddy-assets || git checkout -b caddy-assets

          # Copy upstream source at the tag
          rsync -a --delete --exclude='.git' /tmp/anubis/ /tmp/anubis-fork/

          # Rewrite module path
          sed -i 's|module github.com/TecharoHQ/anubis|module github.com/ToastyTheBot/anubis|' go.mod
          find . -name '*.go' -exec sed -i 's|"github.com/TecharoHQ/anubis|"github.com/ToastyTheBot/anubis|g' {} +

          # Remove .gitignore rules that hide generated assets
          rm -f lib/challenge/preact/static/.gitignore
          rm -f web/static/js/.gitignore
          rm -f xess/.gitignore
          sed -i '/^web\/static\/locales\/\*\.json$/d' .gitignore

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update anubis assets for ${ANUBIS_VERSION} [skip ci]"
          git push origin caddy-assets

      - name: Update go.mod to point to new fork commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPRIVATE: github.com/ToastyTheBot/*
          GONOSUMCHECK: github.com/ToastyTheBot/*
          GONOSUMDB: github.com/ToastyTheBot/*
        run: |
          FORK_COMMIT=$(cd /tmp/anubis-fork && git rev-parse HEAD)
          go get github.com/ToastyTheBot/anubis@${FORK_COMMIT}
          go mod tidy

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add go.mod go.sum
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update anubis fork reference [skip ci]"
          git push
